<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Угадай число — Чат</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 700px; }
        h1 { color: #333; }
        .back-link { margin-bottom: 15px; display: block; color: #4a90d9; }
        #nameSection { margin-bottom: 15px; }
        #nameSection input { padding: 6px; width: 200px; }
        #nameSection button { padding: 6px 12px; }

        #chatBox {
            border: 1px solid #ccc;
            height: 350px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .msg-system { color: #888; font-style: italic; margin: 4px 0; }
        .msg-user { color: #222; margin: 4px 0; }
        .msg-user strong { color: #4a90d9; }

        #gamePanel { margin-bottom: 10px; }
        #gamePanel input[type=number] { padding: 6px; width: 120px; }
        #gamePanel button { padding: 6px 12px; margin-left: 5px; }

        #chatPanel { display: flex; gap: 5px; }
        #chatInput { flex: 1; padding: 6px; }
        #chatPanel button { padding: 6px 12px; }

        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <a class="back-link" href="/">← Вернуться на главную</a>
    <h1>🎮 Чат-игра «Угадай число»</h1>
    <p>Сервер загадал число от <strong>1</strong> до <strong>100</strong>. Угадайте его!</p>

    <div id="nameSection">
        <input type="text" id="playerName" placeholder="Ваше имя" maxlength="20">
        <button onclick="joinGame()">Войти в игру</button>
    </div>

    <div id="chatBox"></div>

    <div id="gamePanel" class="disabled">
        <input type="number" id="guessInput" placeholder="Введите число" min="1" max="100">
        <button onclick="sendGuess()">Угадать</button>
        <button onclick="newGame()">🔄 Новая игра</button>
    </div>

    <div id="chatPanel" class="disabled">
        <input type="text" id="chatInput" placeholder="Сообщение в чат..." maxlength="200">
        <button onclick="sendChat()">Отправить</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let joined = false;
        socket.on('chat_message', (msg) => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            if (msg.system) {
                div.className = 'msg-system';
                div.textContent = msg.text;
            } else {
                div.className = 'msg-user';
                div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('game_won', ({ attempts }) => {
            document.getElementById('guessInput').disabled = true;
        });

        function joinGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert('Введите имя'); return; }
            socket.emit('set_name', name);
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('gamePanel').classList.remove('disabled');
            document.getElementById('chatPanel').classList.remove('disabled');
            joined = true;
        }

        function sendGuess() {
            const val = document.getElementById('guessInput').value;
            if (!val) return;
            socket.emit('guess', val);
            document.getElementById('guessInput').value = '';
        }

        function newGame() {
            socket.emit('new_game');
            document.getElementById('guessInput').disabled = false;
        }

        function sendChat() {
            const text = document.getElementById('chatInput').value.trim();
            if (!text) return;
            socket.emit('chat_message', text);
            document.getElementById('chatInput').value = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('playerName').addEventListener('keydown', e => {
                if (e.key === 'Enter') joinGame();
            });
            document.getElementById('guessInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') sendGuess();
            });
            document.getElementById('chatInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') sendChat();
            });
        });
    </script>
</body>
</html>
