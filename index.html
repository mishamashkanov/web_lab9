<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Танцевальный коллектив - CRUD</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th.sortable { cursor: pointer; user-select: none; }
        button { padding: 5px 10px; margin: 2px; cursor: pointer; }
        input { padding: 5px; margin: 5px; }
        .form { margin: 20px 0; padding: 10px; background: #f5f5f5; }
        #pagination { margin: 10px 0; }
        #pagination button { margin: 0 3px; }
    </style>
</head>
<body>
    <h1>ТАНЦЕВАЛЬНЫЙ КОЛЛЕКТИВ</h1>
    
    <div class="game-link">
        <a href="/game">🎮 Чат-игра «Угадай число»</a>
    </div>

    <div class="form">
        <h3>Добавить/Редактировать</h3>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="Название танца">
        <input type="text" id="description" placeholder="Описание">
        <button onclick="saveItem()">Сохранить</button>
        <button onclick="clearForm()">Очистить</button>
    </div>

    <div>
        <input type="text" id="searchInput" placeholder="Поиск по названию...">
        <button id="clearSearch">Очистить</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th class="sortable" onclick="toggleSort()">Название танца <span id="sortArrow"></span></th>
                <th>Описание</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="pagination"></div>

    <script src="app.js"></script>
</body>
</html>
